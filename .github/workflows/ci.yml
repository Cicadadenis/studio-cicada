name: CI

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cicada-tg==0.3.4
          npm ci

      - name: Core compatibility guard
        run: npm run core:guard

      - name: Check server syntax
        run: npm run check:server

      - name: Compatibility CI
        run: npm run ci:compat

      - name: Build frontend
        run: npm run build
